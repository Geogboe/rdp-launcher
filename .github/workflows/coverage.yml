name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          # llvm-tools-preview is required by cargo-llvm-cov to instrument binaries.
          components: llvm-tools-preview

      # taiki-e/install-action is significantly faster than `cargo install`
      # because it downloads a pre-compiled binary instead of compiling from source.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: Generate coverage report (LCOV)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      # To publish coverage to Codecov, add a CODECOV_TOKEN secret to the repo
      # and uncomment the step below:
      #
      # - uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     files: lcov.info
      #     fail_ci_if_error: true
